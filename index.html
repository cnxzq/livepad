<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>livepad — 实时协作便签</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e1e;
    }
    textarea {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 24px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 16px;
      line-height: 1.6;
      color: #d4d4d4;
      background: #1e1e1e;
      caret-color: #569cd6;
    }
    textarea::selection {
      background: #264f78;
    }
    .status {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #666;
      pointer-events: none;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <textarea id="editor" placeholder="在此输入...（所有连接的客户端将实时同步）" spellcheck="false"></textarea>
  <div class="status" id="status"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    const socket = io();
    let ignoreNextUpdate = false;

    function setStatus(text) {
      status.textContent = text;
      status.style.opacity = '1';
      setTimeout(() => { status.style.opacity = '0'; }, 2000);
    }

    // Receive initial content on connect
    socket.on('init', (content) => {
      editor.value = content;
      setStatus('已连接');
    });

    // Receive updates from other clients
    socket.on('text-update', (content) => {
      if (document.activeElement !== editor) {
        editor.value = content;
      }
    });

    socket.on('connect', () => setStatus('已连接'));
    socket.on('disconnect', () => setStatus('已断开 — 正在重连...'));

    // Emit changes to server
    editor.addEventListener('input', () => {
      socket.emit('text-changed', editor.value);
    });
  </script>
</body>
</html>
