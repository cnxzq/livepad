<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>livepad — 实时协作便签</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; color: #d4d4d4; font-family: system-ui, sans-serif; }

    .app { display: flex; height: 100%; }

    /* --- textarea (left) --- */
    .editor-pane { flex: 1; min-width: 0; }
    textarea {
      display: block; width: 100%; height: 100%; border: none; outline: none;
      resize: none; padding: 24px; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 16px; line-height: 1.6; color: #d4d4d4; background: #1e1e1e;
      caret-color: #569cd6;
    }
    textarea::selection { background: #264f78; }

    /* --- attachment panel (right) --- */
    .attach-pane {
      width: 260px; min-width: 260px; border-left: 1px solid #333;
      display: flex; flex-direction: column; background: #1a1a1a;
    }
    .attach-header {
      padding: 14px 16px 10px; border-bottom: 1px solid #2a2a2a;
      font-size: 13px; color: #888; display: flex; justify-content: space-between; align-items: center;
    }
    .attach-header span { font-weight: 600; }
    .btn-row { display: flex; gap: 6px; }
    .btn {
      font-size: 11px; padding: 4px 10px; border: 1px solid #444; border-radius: 4px;
      background: #252525; color: #aaa; cursor: pointer; transition: .15s;
    }
    .btn:hover { background: #333; color: #ddd; border-color: #666; }
    .btn.danger:hover { background: #5a2020; border-color: #c44; color: #f88; }
    .btn.primary { border-color: #569cd6; color: #569cd6; }
    .btn.primary:hover { background: #1a3a5c; }

    .attach-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .attach-item {
      display: flex; align-items: center; padding: 8px 12px; font-size: 13px;
      border-bottom: 1px solid #222; transition: background .1s;
    }
    .attach-item:hover { background: #252525; }
    .attach-icon { font-size: 16px; margin-right: 8px; flex-shrink: 0; }
    .attach-name {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: #ccc; text-decoration: none;
    }
    .attach-name:hover { color: #569cd6; text-decoration: underline; }
    .attach-size { color: #666; font-size: 11px; margin: 0 8px; flex-shrink: 0; }
    .attach-del {
      color: #666; cursor: pointer; font-size: 14px; flex-shrink: 0;
      padding: 2px 5px; border-radius: 3px;
    }
    .attach-del:hover { color: #f44; background: #3a1515; }

    .empty { text-align: center; color: #555; padding: 30px 16px; font-size: 13px; }

    /* file input hidden */
    #fileInput { display: none; }

    /* status */
    .status {
      position: fixed; bottom: 12px; right: 276px;
      font-size: 12px; color: #555; pointer-events: none; transition: opacity 0.3s;
    }

    /* mobile: collapse attachments */
    @media (max-width: 640px) {
      .attach-pane { width: 100%; min-width: 0; height: 180px; border-left: none; border-top: 1px solid #333; flex-shrink: 0; }
      .app { flex-direction: column; }
      .status { right: 16px; bottom: 196px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="editor-pane">
      <textarea id="editor" placeholder="在此输入...（所有连接的客户端将实时同步）" spellcheck="false"></textarea>
    </div>
    <div class="attach-pane" id="attachPane">
      <div class="attach-header">
        <span>📎 附件</span>
        <div class="btn-row">
          <button class="btn primary" id="btnUpload" title="上传文件">上传</button>
          <button class="btn danger" id="btnClear" title="清空所有附件">清空</button>
        </div>
      </div>
      <div class="attach-list" id="attachList">
        <div class="empty">暂无附件</div>
      </div>
      <input type="file" id="fileInput" multiple>
    </div>
  </div>
  <div class="status" id="status"></div>

  <script>
    const editor = document.getElementById('editor');
    const attachList = document.getElementById('attachList');
    const fileInput = document.getElementById('fileInput');
    const btnUpload = document.getElementById('btnUpload');
    const btnClear = document.getElementById('btnClear');
    const status = document.getElementById('status');

    const IDLE_MS = 500;
    let connected = false, lastLocalInput = 0, pendingRemote = null, idleTimer = null;

    function setStatus(text, good) {
      status.textContent = text;
      status.style.color = good ? '#4caf50' : '#f44336';
      status.style.opacity = '1';
      setTimeout(() => { status.style.opacity = '0'; }, 3000);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function iconFor(name) {
      const ext = name.split('.').pop().toLowerCase();
      const map = {
        jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', svg: '🖼', webp: '🖼',
        mp4: '🎬', mov: '🎬', avi: '🎬', webm: '🎬',
        mp3: '🎵', wav: '🎵', flac: '🎵', ogg: '🎵',
        pdf: '📕', doc: '📄', docx: '📄', txt: '📄', md: '📄',
        zip: '📦', rar: '📦', tar: '📦', gz: '📦', '7z': '📦',
      };
      return map[ext] || '📄';
    }

    function renderFiles(files) {
      if (!files || files.length === 0) {
        attachList.innerHTML = '<div class="empty">暂无附件</div>';
        return;
      }
      attachList.innerHTML = files.map(f => `
        <div class="attach-item">
          <span class="attach-icon">${iconFor(f.name)}</span>
          <a class="attach-name" href="/file/${encodeURIComponent(f.name)}" download>${f.name}</a>
          <span class="attach-size">${formatSize(f.size)}</span>
          <span class="attach-del" data-name="${f.name}" title="删除">✕</span>
        </div>
      `).join('');

      // Delete handlers
      attachList.querySelectorAll('.attach-del').forEach(el => {
        el.addEventListener('click', () => {
          fetch('/file/' + encodeURIComponent(el.dataset.name), { method: 'DELETE' });
        });
      });
    }

    function applyRemote(text) {
      editor.value = text; pendingRemote = null;
    }
    function checkIdle() {
      const idle = Date.now() - lastLocalInput >= IDLE_MS;
      if (idle && pendingRemote !== null) applyRemote(pendingRemote);
      if (!idle) idleTimer = setTimeout(checkIdle, IDLE_MS);
    }

    // --- Upload ---
    btnUpload.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async () => {
      for (const file of fileInput.files) {
        const form = new FormData();
        form.append('file', file);
        await fetch('/upload', { method: 'POST', body: form }).catch(() => {});
      }
      fileInput.value = '';
    });

    btnClear.addEventListener('click', () => {
      if (confirm('确定清空所有附件？')) {
        fetch('/files', { method: 'DELETE' });
      }
    });

    // --- SSE ---
    function connect() {
      const es = new EventSource('/events');

      es.addEventListener('init', (e) => {
        const data = JSON.parse(e.data);
        editor.value = data.text || '';
        renderFiles(data.files || []);
        connected = true;
        setStatus('已连接', true);
      });

      es.addEventListener('text', (e) => {
        const content = JSON.parse(e.data);
        if (Date.now() - lastLocalInput >= IDLE_MS) {
          applyRemote(content);
        } else {
          pendingRemote = content;
          if (!idleTimer) checkIdle();
        }
      });

      es.addEventListener('files', (e) => {
        renderFiles(JSON.parse(e.data));
      });

      es.onerror = () => {
        connected = false;
        setStatus('已断开 — 3 秒后重连...', false);
        es.close();
        setTimeout(connect, 3000);
      };
    }

    editor.addEventListener('input', () => {
      lastLocalInput = Date.now(); pendingRemote = null;
      if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
      if (!connected) return;
      fetch('/update', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: editor.value }),
      }).catch(() => {});
    });

    // Drag & drop upload
    document.addEventListener('dragover', e => { e.preventDefault(); });
    document.addEventListener('drop', async e => {
      e.preventDefault();
      for (const file of e.dataTransfer.files) {
        const form = new FormData();
        form.append('file', file);
        await fetch('/upload', { method: 'POST', body: form }).catch(() => {});
      }
    });

    connect();
  </script>
</body>
</html>
