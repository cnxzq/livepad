<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>livepad — 实时协作便签</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    textarea {
      display: block; width: 100%; height: 100%; border: none; outline: none;
      resize: none; padding: 24px; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 16px; line-height: 1.6; color: #d4d4d4; background: #1e1e1e;
      caret-color: #569cd6;
    }
    textarea::selection { background: #264f78; }
    .status {
      position: fixed; bottom: 12px; right: 16px; font-family: system-ui, sans-serif;
      font-size: 12px; color: #555; pointer-events: none; transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <textarea id="editor" placeholder="在此输入...（所有连接的客户端将实时同步）" spellcheck="false"></textarea>
  <div class="status" id="status"></div>

  <script>
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    const clientId = Date.now() + '-' + Math.random().toString(36).slice(2);

    const IDLE_MS = 500;
    let connected = false;
    let lastLocalInput = 0;
    let pendingRemote = null;
    let idleTimer = null;

    function setStatus(text, good) {
      status.textContent = text;
      status.style.color = good ? '#4caf50' : '#f44336';
      status.style.opacity = '1';
      setTimeout(() => { status.style.opacity = '0'; }, 3000);
    }

    function applyRemote(content) {
      editor.value = content;
      pendingRemote = null;
    }

    function checkIdle() {
      const idle = Date.now() - lastLocalInput >= IDLE_MS;
      if (idle && pendingRemote !== null) {
        applyRemote(pendingRemote);
      }
      if (!idle) {
        idleTimer = setTimeout(checkIdle, IDLE_MS);
      }
    }

    function connect() {
      const es = new EventSource('/events');

      es.addEventListener('init', (e) => {
        editor.value = JSON.parse(e.data);
        connected = true;
        setStatus('已连接', true);
      });

      es.addEventListener('message', (e) => {
        const content = JSON.parse(e.data);
        const idle = Date.now() - lastLocalInput >= IDLE_MS;
        if (idle) {
          applyRemote(content);
        } else {
          pendingRemote = content;
          if (!idleTimer) checkIdle();
        }
      });

      es.onerror = () => {
        connected = false;
        setStatus('已断开 — 3 秒后重连...', false);
        es.close();
        setTimeout(connect, 3000);
      };
    }

    editor.addEventListener('input', () => {
      lastLocalInput = Date.now();
      pendingRemote = null;
      if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
      if (!connected) return;
      fetch('/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: editor.value, id: clientId }),
      }).catch(() => {});
    });

    connect();
  </script>
</body>
</html>
